name: Run Trader

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance pandas numpy requests python-dotenv

      - name: Fix smart quotes in trader.py
        run: |
          python3 - << 'PYEOF'
          with open('trader.py', 'r', encoding='utf-8') as f:
              content = f.read()
          replacements = {
              '\u201c': '"', '\u201d': '"',
              '\u2018': "'", '\u2019': "'",
              '\u2014': '--', '\u2013': '-',
              '\u2026': '...', '\ufe0f': '',
          }
          for bad, good in replacements.items():
              content = content.replace(bad, good)
          with open('trader.py', 'w', encoding='utf-8') as f:
              f.write(content)
          print("trader.py cleaned")
          PYEOF

      - name: Run trader
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python trader.py
