name: Run Trader

on:
  schedule:
    - cron: '0 */1 * * *'    # Hver 1. time
    #- cron: '*/5 * * * *'   # Hvert 5. min
  workflow_dispatch:         # Manuell kjøring ved behov

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yfinance pandas requests python-dotenv

      - name: Run trader
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python trader.py